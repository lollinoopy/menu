<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>입닭쳐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p1:#D93B0B;--p1l:#FFEDE6;--p1d:#7a1c00;
  --p2:#1250C4;--p2l:#E3EEFF;--p2d:#0a2e6e;
  --yellow:#FFD600;
  --bg:#FFFDE7;--text:#1a1a1a;--muted:#777;
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  background-image:radial-gradient(circle,#FFD60022 1px,transparent 1px);
  background-size:20px 20px;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:1rem 1rem 2rem;
  color:var(--text);overflow-x:hidden;
}
h1{
  font-family:'Black Han Sans',sans-serif;
  font-size:2.6rem;text-align:center;color:#1a1a1a;
  letter-spacing:2px;margin-bottom:0.1rem;
  text-shadow:4px 4px 0 var(--yellow),5px 5px 0 rgba(0,0,0,0.15);
}
.tagline{font-size:.88rem;color:#555;text-align:center;margin-bottom:1rem;font-weight:900;letter-spacing:1px;}

/* denied overlay */
.denied-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.55);z-index:500;
  align-items:center;justify-content:center;padding:1rem;
}
.denied-box{
  background:var(--p1l);border:3px solid var(--p1);border-radius:20px;
  padding:1.5rem;max-width:300px;width:100%;
  box-shadow:6px 6px 0 var(--p1d);text-align:center;
}
.denied-title{font-size:1rem;font-weight:900;color:var(--p1d);margin-bottom:.75rem;}
.denied-steps{font-size:.82rem;color:var(--p1d);line-height:2.1;list-style:none;text-align:left;font-weight:700;margin-bottom:.75rem;}
.denied-steps li::before{content:"→ ";font-weight:900;}
.retry-btn{
  width:100%;padding:11px;border:2.5px solid var(--p1d);border-radius:12px;
  background:white;color:var(--p1d);font-family:'Nunito',sans-serif;
  font-size:.95rem;font-weight:900;cursor:pointer;
  box-shadow:3px 3px 0 var(--p1d);transition:transform .1s,box-shadow .1s;
}
.retry-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--p1d);}

/* game */
.game-screen{display:flex;flex-direction:column;align-items:center;width:100%;max-width:440px;}
.mic-status{
  display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:99px;
  border:2px solid #1a1a1a;background:white;
  font-size:.75rem;font-weight:900;color:var(--muted);
  margin-bottom:.75rem;box-shadow:2px 2px 0 #1a1a1a;
}
.dot{width:9px;height:9px;border-radius:50%;background:#ccc;border:1px solid #aaa;transition:background .3s;}
.dot.on{background:#22CC55;border-color:#1a9940;}
.dot.pulse{animation:pulse .7s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* battle area — fixed height so layout is stable */
.battle-area{
  display:flex;align-items:flex-end;justify-content:center;
  gap:.5rem;width:100%;
  height:220px; /* fixed! winner chicken grows inside this via transform, not layout */
  margin-bottom:.75rem;
  position:relative;
}
.player-side{
  display:flex;flex-direction:column;align-items:center;
  gap:.35rem;flex:1;height:100%;justify-content:flex-end;
}
.player-label{
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:900;
  padding:3px 12px;border-radius:99px;border:2.5px solid;box-shadow:3px 3px 0;
}
.p1-label{color:var(--p1d);border-color:var(--p1);background:var(--p1l);box-shadow:3px 3px 0 var(--p1d);}
.p2-label{color:var(--p2d);border-color:var(--p2);background:var(--p2l);box-shadow:3px 3px 0 var(--p2d);}
.db-val{font-family:'Nunito',sans-serif;font-size:1.7rem;font-weight:900;line-height:1;}
.db-unit{font-size:.6rem;color:var(--muted);font-weight:700;}

/* chicken container: clipping box so winner scale stays inside layout */
.chicken-wrap{
  flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;
  overflow:visible; /* we use transform not width, so overflow visible is fine visually */
  position:relative;
}
.chicken{
  display:block;
  width:75px;
  transform-origin:bottom center;
  /* scale via transform so layout box doesn't change */
  transition:transform .07s ease-out;
  image-rendering:auto;
}
/* winner glow */
.chicken.winner-glow{
  animation:winPulse .6s ease-in-out infinite alternate;
}
@keyframes winPulse{
  from{filter:drop-shadow(0 0 8px gold) drop-shadow(0 0 16px orange);}
  to{filter:drop-shadow(0 0 20px gold) drop-shadow(0 0 36px #ff8800);}
}

.bar-track{
  width:85%;max-width:90px;height:10px;
  background:#eee;border-radius:5px;overflow:hidden;border:2px solid #1a1a1a;
}
.bar-fill{height:100%;border-radius:3px;width:0%;transition:width .07s ease-out;}
.p1-fill{background:var(--p1);}
.p2-fill{background:var(--p2);}

.vs-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;align-self:center;margin-bottom:2rem;flex-shrink:0;
}
.vs{
  font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:#1a1a1a;
  text-shadow:3px 3px 0 var(--yellow);transform:rotate(-5deg);display:block;
}
.vs-sparks{font-size:1rem;}

/* controls */
.controls{display:flex;flex-direction:column;align-items:center;gap:.6rem;width:100%;}
.timer-ring{position:relative;width:60px;height:60px;display:none;margin:0 auto;}
.timer-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#eee;stroke-width:7;}
.ring-fill{fill:none;stroke-width:7;stroke-linecap:round;stroke-dasharray:163;stroke-dashoffset:0;transition:stroke-dashoffset .1s linear;}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;}
.round-info{font-size:.8rem;color:var(--muted);text-align:center;min-height:1.1em;font-weight:900;}
.main-btn{
  width:100%;padding:15px;border:3px solid #1a1a1a;border-radius:18px;
  background:white;color:#1a1a1a;font-family:'Nunito',sans-serif;
  font-size:1.1rem;font-weight:900;cursor:pointer;box-shadow:6px 6px 0 #1a1a1a;
  transition:transform .1s,box-shadow .1s;
}
.main-btn:not(:disabled):active{transform:translate(5px,5px);box-shadow:1px 1px 0 #1a1a1a;}
.main-btn:disabled{opacity:.38;cursor:default;}
.main-btn.rec1{background:var(--p1);color:white;border-color:var(--p1d);box-shadow:6px 6px 0 var(--p1d);}
.main-btn.rec2{background:var(--p2);color:white;border-color:var(--p2d);box-shadow:6px 6px 0 var(--p2d);}
.status-text{font-size:.82rem;color:var(--muted);text-align:center;min-height:1.1em;font-weight:900;}
.winner-banner{
  display:none;width:100%;padding:1rem;border:3px solid #1a1a1a;border-radius:18px;
  text-align:center;font-family:'Nunito',sans-serif;font-size:1.35rem;font-weight:900;
  box-shadow:6px 6px 0 #1a1a1a;margin-bottom:.25rem;
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);line-height:1.5;
}
@keyframes pop{from{transform:scale(.4) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
.reset-btn{
  display:none;padding:12px 32px;border:3px solid #1a1a1a;border-radius:14px;
  background:var(--yellow);color:#1a1a1a;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:900;cursor:pointer;box-shadow:5px 5px 0 #1a1a1a;
  transition:transform .1s,box-shadow .1s;
}
.reset-btn:active{transform:translate(4px,4px);box-shadow:1px 1px 0 #1a1a1a;}

#cc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;display:none;}

@keyframes shake{
  0%,100%{transform-origin:bottom center;transform:scaleX(var(--sx,1)) translateX(0) rotate(0deg)}
  25%{transform:scaleX(var(--sx,1)) translateX(-6px) rotate(-4deg)}
  75%{transform:scaleX(var(--sx,1)) translateX(6px) rotate(4deg)}
}
</style>
</head>
<body>

<h1>입닭쳐</h1>
<p class="tagline">🐔 Who Crows Louder? 🐔</p>

<canvas id="cc"></canvas>

      <li>Tap "Site Settings"</li>
      <li>Set Microphone to "Allow"</li>
      <li>Refresh the page and try again</li>
    </ul>
    <button class="retry-btn" id="retryBtn">Try Again</button>
  </div>
</div>

<div class="game-screen">
  <div class="mic-status">
    <div class="dot" id="micDot"></div>

      </div>
      <div class="bar-track"><div class="bar-fill p2-fill" id="bar2"></div></div>
    </div>
  </div>

  <div class="controls">
    <div class="timer-ring" id="timerRing">
      <svg width="60" height="60" viewBox="0 0 64 64">
        <circle class="ring-bg" cx="32" cy="32" r="26"/>
        <circle class="ring-fill" id="ringFill" cx="32" cy="32" r="26" stroke="var(--p1)"/>
      </svg>
      <div class="timer-num" id="timerNum">3.0</div>
    </div>
    <div class="round-info" id="roundInfo">P1 goes first!</div>
    <button class="main-btn" id="mainBtn">🎤 SCREAM! (P1)</button>
    <div class="status-text" id="statusText">Press the button and YELL your lungs out!</div>
    <button class="reset-btn" id="resetBtn">🔄 Play Again!</button>
  </div>
</div>

<script>
const ROUND_MS=3000;
const BASE_W=75;       // px, CSS width of chicken img
const MAX_SCALE=3.8;   // max scale during screaming
const WIN_SCALE=2.2;   // winner scale — big but fits inside layout box
let state='idle',p1Max=0,p2Max=0,animFrame,audioCtx,analyser,winnerP=0;
let cachedStream=null;
const $=id=>document.getElementById(id);

// current transform scale per chicken (needed to compose shake+scale)
let sc1=1, sc2=1, flip2=-1;

const imgs=[new Image(),new Image()];
imgs[0].src=$('c1').src;
imgs[1].src=$('c2').src;

/* ── confetti ── */
const cv=$('cc'),cx=cv.getContext('2d');
let parts=[],confRunning=false;
function launchChickens(player){
  cv.style.display='block';
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  parts=[];
  const img=imgs[player-1];
  for(let i=0;i<50;i++)parts.push({
    x:Math.random()*cv.width,y:-80-Math.random()*400,
    vx:(Math.random()-.5)*5,vy:1+Math.random()*5,
    rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.2,
    size:50+Math.random()*75,img,
    flip:Math.random()>.5,
    wobble:Math.random()*Math.PI*2,wS:.04+Math.random()*.07,
  });
  confRunning=true;animateConf();
}
function animateConf(){
  if(!confRunning)return;
  cx.clearRect(0,0,cv.width,cv.height);
  let alive=0;
  for(const p of parts){
    p.y+=p.vy;p.vy+=.1;
    p.x+=p.vx+Math.sin(p.wobble)*2.5;
    p.wobble+=p.wS;p.rot+=p.rotV;
    if(p.y<cv.height+150)alive++;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);
    if(p.flip)cx.scale(-1,1);
    const asp=p.img.naturalHeight/p.img.naturalWidth;
    cx.drawImage(p.img,-p.size/2,-p.size*asp/2,p.size,p.size*asp);
    cx.restore();
  }
  if(alive>0)requestAnimationFrame(animateConf);
  else{cv.style.display='none';confRunning=false;}
}

/* ── dB ── */
function getDb(){
  const buf=new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  let sum=0;
  for(let i=0;i<buf.length;i++){const v=(buf[i]-128)/128;sum+=v*v;}
  const rms=Math.sqrt(sum/buf.length);
  if(rms<0.001)return 0;
  return Math.max(0,Math.min(100,(20*Math.log10(rms)+40)*2.5));
}

/* ── chicken transform helpers ── */
// Use CSS transform so layout box (width=75px) never changes → no reflow
function setChickenScale(el,scale,flipX){
  const fx=flipX?-1:1;
  el.style.transform=`scaleX(${fx*scale}) scaleY(${scale})`;
}
function shakeAndScale(el,scale,flipX){
  el.style.animation='none';
  void el.offsetWidth;
  el.style.setProperty('--sx', flipX?-scale:scale);
  el.style.animation='shake .13s ease-in-out';
  // after shake restore scale
  setTimeout(()=>setChickenScale(el,scale,flipX),140);
}

function updateChicken(el,db,flipX){
  const pct=Math.min(db/100,1);
  const sc=1+pct*(MAX_SCALE-1);
  if(pct>.08){
    shakeAndScale(el,sc,flipX);
  }else{
    setChickenScale(el,sc,flipX);
  }
  return sc;
}

function setWinnerChicken(el,flipX){
  // spring-like: overshoot then settle
  el.classList.add('winner-glow');
  el.style.transition='transform .5s cubic-bezier(.34,1.56,.64,1)';
  setChickenScale(el,WIN_SCALE,flipX);
  setTimeout(()=>{el.style.transition='';} ,600);
}

function resetChickenScale(el,flipX){
  el.style.transition='';
  el.style.animation='none';
  el.classList.remove('winner-glow');
  setChickenScale(el,1,flipX);
}

/* ── round ── */
async function startRound(player){
  state='recording';
  $('mainBtn').disabled=true;
  $('mainBtn').classList.add(player===1?'rec1':'rec2');
  $('timerRing').style.display='block';
  $('ringFill').style.stroke=player===1?'var(--p1)':'var(--p2)';
  $('winnerBanner').style.display='none';
  resetChickenScale($('c1'),false);
  resetChickenScale($('c2'),true);
  let maxDb=0;
  const TICK=50,steps=ROUND_MS/TICK,circ=163;
  try{
    let stream;
    if(player===2&&cachedStream&&cachedStream.active){
      stream=cachedStream;
    }else{
      stream=await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
      });
      cachedStream=stream;
    }
    $('micDot').classList.add('on','pulse');
    $('micLabel').textContent='Recording...';
    if(audioCtx)try{audioCtx.close();}catch(e){}
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=2048;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    let step=0;
    const iv=setInterval(()=>{
      step++;
      const rem=Math.max(0,(ROUND_MS-step*TICK)/1000);
      $('timerNum').textContent=rem.toFixed(1);
      $('ringFill').style.strokeDashoffset=circ*(step/steps);
    },TICK);
    const tick=()=>{
      if(state!=='recording')return;
      const db=getDb();if(db>maxDb)maxDb=db;
      $('statusText').textContent='LOUDER!! LOUDER!!';
      if(player===1){
        $('db1').innerHTML=Math.round(db)+'<span class="db-unit"> dB</span>';
        $('bar1').style.width=db+'%';
        updateChicken($('c1'),db,false);
      }else{
        $('db2').innerHTML=Math.round(db)+'<span class="db-unit"> dB</span>';
        $('bar2').style.width=db+'%';
        updateChicken($('c2'),db,true);
      }
      animFrame=requestAnimationFrame(tick);
    };
    tick();
    setTimeout(()=>{
      state='done';clearInterval(iv);cancelAnimationFrame(animFrame);
      if(player===2){stream.getTracks().forEach(t=>t.stop());cachedStream=null;}
      try{audioCtx.close();}catch(e){}
      $('micDot').classList.remove('pulse');$('micLabel').textContent='Mic ready';
      $('mainBtn').classList.remove('rec1','rec2');$('timerRing').style.display='none';
      if(player===1){
        p1Max=maxDb;
        $('db1').innerHTML=Math.round(maxDb)+'<span class="db-unit"> dB</span>';
        $('bar1').style.width=Math.min(maxDb,100)+'%';
        updateChicken($('c1'),maxDb,false);
        $('roundInfo').textContent='P1: '+Math.round(maxDb)+' dB  |  Now P2!';
        $('mainBtn').textContent='🎤 SCREAM! (P2)';
        $('mainBtn').disabled=false;
        $('statusText').textContent='P2! Show them what you got!';
        state='p2turn';
      }else{
        p2Max=maxDb;
        $('db2').innerHTML=Math.round(maxDb)+'<span class="db-unit"> dB</span>';
        $('bar2').style.width=Math.min(maxDb,100)+'%';
        updateChicken($('c2'),maxDb,true);
        showResult();
      }
    },ROUND_MS);
  }catch(e){
    $('mainBtn').classList.remove('rec1','rec2');$('mainBtn').disabled=false;
    $('timerRing').style.display='none';
    state=player===1?'idle':'p2turn';
    $('micDot').classList.remove('on','pulse');
    $('deniedOverlay').style.display='flex';
  }
}

/* ── result ── */
function showResult(){
  $('mainBtn').style.display='none';$('resetBtn').style.display='block';
  const b=$('winnerBanner');b.style.display='block';
  if(p1Max>p2Max){
    b.innerHTML='🏆 P1 WINS!!<br><span style="font-size:.95rem;font-weight:700">'+Math.round(p1Max)+' dB vs '+Math.round(p2Max)+' dB</span>';
    b.style.cssText+=';background:var(--p1l);color:var(--p1d);border-color:var(--p1);box-shadow:6px 6px 0 var(--p1d)';
    winnerP=1;
    setTimeout(()=>setWinnerChicken($('c1'),false),400);
  }else if(p2Max>p1Max){
    b.innerHTML='🏆 P2 WINS!!<br><span style="font-size:.95rem;font-weight:700">'+Math.round(p2Max)+' dB vs '+Math.round(p1Max)+' dB</span>';
    b.style.cssText+=';background:var(--p2l);color:var(--p2d);border-color:var(--p2);box-shadow:6px 6px 0 var(--p2d)';
    winnerP=2;
    setTimeout(()=>setWinnerChicken($('c2'),true),400);
  }else{
    b.innerHTML='🤝 TIE GAME!<br><span style="font-size:.95rem;font-weight:700">Both '+Math.round(p1Max)+' dB</span>';
    b.style.cssText+=';background:#FFFDE7;color:#555;border-color:#aaa;box-shadow:6px 6px 0 #aaa';
    winnerP=0;
  }
  $('roundInfo').textContent='Game over!';$('statusText').textContent='';
  if(winnerP>0)setTimeout(()=>launchChickens(winnerP),500);
  else setTimeout(()=>{launchChickens(1);setTimeout(()=>launchChickens(2),600);},500);
}

$('mainBtn').addEventListener('click',()=>{
  if(state==='idle')startRound(1);
  else if(state==='p2turn')startRound(2);
});
$('retryBtn').addEventListener('click',()=>{$('deniedOverlay').style.display='none';});
$('resetBtn').addEventListener('click',()=>{
  p1Max=0;p2Max=0;state='idle';
  if(cachedStream){cachedStream.getTracks().forEach(t=>t.stop());cachedStream=null;}
  $('db1').innerHTML='0<span class="db-unit"> dB</span>';
  $('db2').innerHTML='0<span class="db-unit"> dB</span>';
  $('bar1').style.width='0%';$('bar2').style.width='0%';
  resetChickenScale($('c1'),false);
  resetChickenScale($('c2'),true);
  $('winnerBanner').style.display='none';
  $('mainBtn').style.display='block';
  $('mainBtn').textContent='🎤 SCREAM! (P1)';
  $('mainBtn').disabled=false;
  $('resetBtn').style.display='none';
  $('roundInfo').textContent='P1 goes first!';
  $('statusText').textContent='Press the button and YELL your lungs out!';
  $('micDot').classList.remove('on','pulse');
  $('micLabel').textContent='Tap SCREAM to start!';
  confRunning=false;cv.style.display='none';
});
</script>
